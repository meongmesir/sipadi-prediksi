version: '3.8'

services:
  postgres_db:
    image: postgres:15-alpine
    container_name: sipadi_postgres
    restart: always
    environment:
      POSTGRES_USER: sipadi
      POSTGRES_PASSWORD: sipadi123
      POSTGRES_DB: sipadi_prediks
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
    driver: local
